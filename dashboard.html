// TAB RENDERERS
// ═══════════════════════════════════════════════════════════════
function renderTab(type) {
  populateFilters(type);
  applyFilters(type);
}

function renderTabContent(type) {
  if (type === 'quote') renderQuote();
  else if (type === 'personnel') renderPersonnel();
  else if (type === 'equipment') renderEquipment();
  else if (type === 'master') renderMaster();
  else if (type === 'leads') renderLeads();
}

// ─── Helper: date-only filtered quotes (ignores status/segment/customer/responsible filters) ───
function getDateFilteredQuotes() {
  let d = [...state.quote.raw];
  const from = document.getElementById('q-from').value;
  const to = document.getElementById('q-to').value;
  if (from) d = d.filter(r => { const x = excelDate(r['Estimated Start Date']) || excelDate(r['Estimated start date']) || parseDate(r['Quote Date']); return x && x >= new Date(from); });
  if (to) d = d.filter(r => { const x = excelDate(r['Estimated Start Date']) || excelDate(r['Estimated start date']) || parseDate(r['Quote Date']); return x && x <= new Date(to + 'T23:59:59'); });
  return d;
}

// ─── QUOTE TAB ───
function renderQuote() {
  // Close drill-down if open
  const ddEl = document.getElementById('quote-drilldown');
  if (ddEl) { ddEl.style.display = 'none'; ddEl.innerHTML = ''; }
  const cqEl = document.getElementById('charts-quote');
  if (cqEl) cqEl.style.display = '';

  const d = state.quote.filtered;
  const dDateOnly = getDateFilteredQuotes();
  const total = d.length;
  const totalDateOnly = dDateOnly.length;
  const rev = sumBy(d, 'Sum Total');
  const weighted = sumBy(d, 'Cost Sum Total');
  const cmr = avgBy(d, 'CMR Total');
  const acc = d.filter(r => r['Status'] === 'Accepted').length;
  // Win Rate: mismo alcance que filtros (fecha, status, etc.) — accepted / total quotes en vista
  const wr = total > 0 ? (acc / total * 100) : 0;

  // Target card: show when filtering year 2026 + status Accepted
  const BUDGET_TARGET = 7665956;
  const yearVal = document.getElementById('q-year').value;
  const fromVal = document.getElementById('q-from').value;
  const toVal = document.getElementById('q-to').value;
  const statusVal = document.getElementById('q-status').value;
  const is2026 = yearVal === '2026' || (fromVal && fromVal.startsWith('2026')) || (toVal && toVal.startsWith('2026'));
  const isAccepted = statusVal === 'Accepted';
  const showTarget = is2026 && isAccepted;

  const targetCard = showTarget ? (() => {
    const remaining = Math.max(0, BUDGET_TARGET > 0 ? ((BUDGET_TARGET - rev) / BUDGET_TARGET * 100) : 0);
    return { label: 'To Target', value: remaining, format: 'pct', sub: fmtCur(rev) + ' of ' + fmtCur(BUDGET_TARGET) + ' budget', accent: remaining <= 0 ? 'var(--success)' : 'var(--warm)' };
  })() : null;

  const kpis = [
    { label: 'Total Quotes', value: total, format: 'int', sub: d.filter(r => r['Status'] === 'Draft').length + ' drafts pending', accent: 'var(--brand)' },
    { label: 'Total Revenue', value: rev, format: 'cur', sub: 'Base currency (USD)', accent: 'var(--success)' },
    ...(targetCard ? [targetCard] : []),
    { label: 'Total Cost', value: weighted, format: 'cur', sub: 'Cost sum total', accent: 'var(--info)' },
    { label: 'Avg CMR', value: cmr, format: 'pct', sub: 'Contribution margin', accent: 'var(--warning)' },
    { label: 'Win Rate', value: wr, format: 'pct', sub: acc + ' accepted / ' + total + ' quotes in view', accent: 'var(--warm)' }
  ];
  renderKPIs('kpi-quote', kpis);

  // Group-by summary table (after filters)
  const qgs = document.getElementById('quote-group-summary');
  if (qgs) {
    if (!quoteGroupBy) {
      qgs.innerHTML = '';
    } else {
      const gg = groupBy(d, quoteGroupBy);
      const rows = Object.keys(gg).sort((a, b) => gg[b].length - gg[a].length).map(k => {
        const rowsK = gg[k];
        const accK = rowsK.filter(r => r['Status'] === 'Accepted').length;
        const revK = sumBy(rowsK, 'Sum Total');
        return '<tr><td>' + esc(k) + '</td><td style="text-align:right;font-variant-numeric:tabular-nums">' + fmtInt(rowsK.length) + '</td><td style="text-align:right">' + fmtCur(revK) + '</td><td style="text-align:right">' + fmtInt(accK) + '</td></tr>';
      }).join('');
      qgs.innerHTML =
        '<div class="chart-card" style="margin-bottom:16px"><div class="chart-header"><span class="chart-title">Grouped summary</span><span class="chart-tag">' + esc(quoteGroupBy) + '</span></div>' +
        '<div style="overflow:auto;padding:0 16px 16px"><table class="mini-data-table" style="width:100%;border-collapse:collapse;font-size:12px">' +
        '<thead><tr><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border)">' + esc(quoteGroupBy) + '</th><th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">Quotes</th><th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">Revenue</th><th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">Accepted</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div></div>';
    }
  }

  // Chart 1: Sales Funnel (date-only filter, ignores other filters)
  const so = ['Draft', 'Sent', 'Accepted', 'Rejected'];
  const sc = ['#f59e0b', '#3b82f6', '#10b981', '#ef4444'];
  const sv = so.map(s => dDateOnly.filter(r => r['Status'] === s).length);
  const funnelTotal = dDateOnly.length;
  const funnelOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ data: sv }],
    plotOptions: { bar: { horizontal: true, borderRadius: 6, barHeight: '55%', distributed: true } },
    colors: sc,
    xaxis: { categories: so },
    yaxis: { labels: { style: { fontSize: '12px', fontWeight: 600 } } },
    dataLabels: { enabled: true, formatter: v => v + ' quotes', style: { fontSize: '12px', fontWeight: '600' } },
    legend: { show: false },
    grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } },
    tooltip: { y: { formatter: v => v + ' quotes (' + (funnelTotal > 0 ? (v / funnelTotal * 100).toFixed(1) : 0) + '%)' } }
  };

  // Chart 2: Revenue by Segment (bar chart, all filters)
  const sg = groupBy(d, 'Segment');
  const se = topN(Object.fromEntries(Object.entries(sg).map(([k, v]) => [k, sumBy(v, 'Sum Total')])));
  const segRevOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ data: se.map(e => e[1]) }],
    plotOptions: { bar: { horizontal: true, borderRadius: 6, barHeight: '60%', distributed: true } },
    colors: COLORS,
    dataLabels: { enabled: true, textAnchor: 'start', offsetX: 5, style: { fontSize: '11px', fontWeight: '500' }, formatter: v => fmtCur(v) },
    xaxis: { categories: se.map(e => e[0]), labels: { formatter: v => fmt(+v) } },
    yaxis: { labels: { style: { fontSize: '11px' }, maxWidth: 160 } },
    grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } },
    legend: { show: false },
    tooltip: { y: { formatter: v => fmtCur(v) } }
  };

  // Chart 3: Top 10 Clients (Donut)
  const cg = groupBy(d, 'Customer');
  const ce = topN(Object.fromEntries(Object.entries(cg).map(([k, v]) => [k, sumBy(v, 'Sum Total')])));
  const clientsOpts = {
    chart: { type: 'donut', height: 300 },
    series: ce.map(e => e[1]),
    labels: ce.map(e => e[0]),
    colors: COLORS.slice(0, ce.length),
    plotOptions: { pie: { donut: { size: '55%', labels: { show: true, total: { show: true, label: 'Total', formatter: w => fmtCur(w.globals.seriesTotals.reduce((a, b) => a + b, 0)) } } } } },
    dataLabels: { enabled: false },
    legend: { show: true, position: 'right', fontSize: '11px', labels: { useSeriesColors: true }, formatter: (name, opts) => name + ' — ' + fmtCur(opts.w.globals.series[opts.seriesIndex]) },
    tooltip: { y: { formatter: v => fmtCur(v) } }
  };

  // Chart 4: Pipeline by Probability
  const pg = groupBy(d, 'Probability');
  const pl = Object.keys(pg).sort((a, b) => +a - +b);
  const probOpts = {
    chart: { type: 'bar', height: 280 },
    series: [
      { name: 'Weighted', data: pl.map(p => sumBy(pg[p], 'Weighted Probability Sum')) },
      { name: 'Total', data: pl.map(p => sumBy(pg[p], 'Sum Total')) }
    ],
    colors: [COLORS[0], COLORS[2]],
    plotOptions: { bar: { borderRadius: 5, columnWidth: '55%' } },
    dataLabels: { enabled: false },
    xaxis: { categories: pl.map(p => p + '%'), labels: { style: { fontSize: '10px' } } },
    yaxis: { labels: { formatter: v => fmt(v) } },
    legend: { show: true, position: 'top', horizontalAlign: 'left', fontSize: '11px' },
    tooltip: { shared: true, intersect: false, y: { formatter: v => fmtCur(v) } }
  };

  // Chart 5: Top Products (Polar Area)
  const prg = groupBy(d, 'Axess Product');
  const pre = topN(Object.fromEntries(Object.entries(prg).map(([k, v]) => [k, sumBy(v, 'Sum Total')])));
  const productsOpts = {
    chart: { type: 'polarArea', height: 320 },
    series: pre.map(e => e[1]),
    labels: pre.map(e => e[0]),
    colors: COLORS.slice(0, pre.length),
    stroke: { width: 1, colors: ['var(--card)'] },
    fill: { opacity: 0.85 },
    plotOptions: { polarArea: { rings: { strokeWidth: 1, strokeColor: 'var(--border)' }, spokes: { strokeWidth: 1, connectorColors: 'var(--border)' } } },
    dataLabels: { enabled: false },
    legend: { show: true, position: 'right', fontSize: '11px', labels: { useSeriesColors: true }, formatter: function(name, opts) { return (name.length > 28 ? name.substring(0, 28) + '…' : name) + ' — ' + fmtCur(opts.w.globals.series[opts.seriesIndex]); } },
    tooltip: { y: { formatter: v => fmtCur(v) } },
    yaxis: { show: false }
  };

  // Chart 6: Revenue by Responsible
  const rg = groupBy(d, 'Responsible');
  const re = topN(Object.fromEntries(Object.entries(rg).map(([k, v]) => [k.split('@')[0].replace(/\./g, ' ').trim(), sumBy(v, 'Sum Total')])));
  const respOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ data: re.map(e => e[1]) }],
    plotOptions: { bar: { horizontal: true, borderRadius: 6, barHeight: '60%', distributed: true } },
    colors: COLORS.slice(5),
    dataLabels: { enabled: true, textAnchor: 'start', offsetX: 5, style: { fontSize: '11px', fontWeight: '500' }, formatter: v => fmtCur(v) },
    xaxis: { categories: re.map(e => e[0]), labels: { formatter: v => fmt(+v) } },
    yaxis: { labels: { style: { fontSize: '11px' }, maxWidth: 160 } },
    grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } },
    legend: { show: false },
    tooltip: { y: { formatter: v => fmtCur(v) } }
  };

  // Chart 7: Timeline (by Quote Date) — filtered locally by timelineYearFilter
  const byM = {};
  d.forEach(r => {
    const dt = parseDate(r['Quote Date']);
    if (!dt) return;
    if (timelineYearFilter && dt.getFullYear() !== +timelineYearFilter) return;
    const k = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0');
    byM[k] = (byM[k] || 0) + 1;
  });
  const tl = Object.keys(byM).sort();
  const timelineTag = timelineYearFilter ? timelineYearFilter : 'All Years';
  const timelineOpts = {
    chart: { type: 'area', height: 280, zoom: { enabled: true, type: 'x' } },
    series: [{ name: 'Quotes', data: tl.map(k => byM[k]) }],
    colors: [COLORS[0]],
    fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0.05, stops: [0, 90, 100] } },
    dataLabels: { enabled: false },
    stroke: { curve: 'smooth', width: 2.5 },
    xaxis: { categories: tl, labels: { rotate: -45, style: { fontSize: '10px' } } },
    yaxis: { labels: { formatter: v => fmt(v) } },
    markers: { size: 0, hover: { size: 5 } }
  };

  // Chart 8: CMR % by Client
  const cmrByClient = groupBy(d, 'Customer');
  const cmrs = Object.entries(cmrByClient).map(([k, v]) => [k, avgBy(v, 'CMR Total')]).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const cmrOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ data: cmrs.map(e => e[1]) }],
    plotOptions: { bar: { horizontal: true, borderRadius: 5, barHeight: '60%', distributed: true } },
    colors: cmrs.map((_, i) => COLORS[i % COLORS.length]),
    xaxis: { categories: cmrs.map(e => e[0]), labels: { formatter: v => (+v).toFixed(1) + '%' } },
    yaxis: { labels: { style: { fontSize: '11px' }, maxWidth: 160 } },
    dataLabels: { enabled: true, formatter: v => v.toFixed(1) + '%', style: { fontSize: '11px', fontWeight: '500' } },
    legend: { show: false },
    tooltip: { y: { formatter: v => v.toFixed(1) + '%' } }
  };

  // Chart 9: Quotes by Segment (count)
  const qsBySegment = Object.entries(sg).map(([k, v]) => [k, v.length]).sort((a, b) => b[1] - a[1]);
  const qsSegOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ data: qsBySegment.map(e => e[1]) }],
    plotOptions: { bar: { horizontal: true, borderRadius: 5, barHeight: '60%', distributed: true } },
    colors: qsBySegment.map((_, i) => COLORS[i % COLORS.length]),
    xaxis: { categories: qsBySegment.map(e => e[0]) },
    yaxis: { labels: { style: { fontSize: '11px' }, maxWidth: 160 } },
    dataLabels: { enabled: true, formatter: v => v + ' quotes', style: { fontSize: '11px', fontWeight: '500' } },
    legend: { show: false },
    tooltip: { y: { formatter: v => v + ' quotes' } },
    grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } }
  };

  // Win Rate by Segment (within filtered set): Accepted / (Accepted + Rejected) per segment
  const wrSegRows = Object.entries(sg).map(([seg, rows]) => {
    const a = rows.filter(r => r['Status'] === 'Accepted').length;
    const dec = rows.filter(r => r['Status'] === 'Accepted' || r['Status'] === 'Rejected').length;
    const pct = dec > 0 ? (a / dec * 100) : null;
    return { seg, pct, dec, a };
  }).filter(e => e.dec > 0 && e.pct != null).sort((a, b) => b.pct - a.pct);
  const wrSegOpts = wrSegRows.length ? {
    chart: { type: 'bar', height: 280 },
    series: [{ data: wrSegRows.map(e => e.pct) }],
    plotOptions: { bar: { horizontal: true, borderRadius: 6, barHeight: '60%', distributed: true } },
    colors: wrSegRows.map(e => e.pct >= 50 ? '#10b981' : '#f59e0b'),
    xaxis: {
      categories: wrSegRows.map(e => e.seg),
      max: 100,
      labels: { formatter: v => Number(v).toFixed(0) + '%' }
    },
    yaxis: { labels: { style: { fontSize: '11px' }, maxWidth: 160 } },
    dataLabels: { enabled: true, formatter: v => Number(v).toFixed(0) + '%', style: { fontSize: '11px', fontWeight: '500' } },
    legend: { show: false },
    grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } },
    tooltip: {
      y: {
        formatter: (v, opts) => {
          const i = opts.dataPointIndex;
          const r = wrSegRows[i];
          return r ? (Number(v).toFixed(1) + '% — ' + r.a + ' won / ' + r.dec + ' decided') : '';
        }
      }
    }
  } : {
    chart: { type: 'bar', height: 200 },
    series: [{ data: [0] }],
    xaxis: { categories: ['No decided quotes in filter'] },
    plotOptions: { bar: { horizontal: true } },
    colors: ['#94a3b8'],
    tooltip: { enabled: false },
    dataLabels: { enabled: false }
  };

  // Chart 10: Revenue vs Cost over Time (grouped bar)
  const revCostOpts = buildRevCostChart(d);

  // Chart 11: Revenue by Client (bar chart)
  const revClientG = groupBy(d, 'Customer');
  const revClientE = topN(Object.fromEntries(Object.entries(revClientG).map(([k, v]) => [k, sumBy(v, 'Sum Total')])));
  const revClientOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ data: revClientE.map(e => e[1]) }],
    plotOptions: { bar: { horizontal: true, borderRadius: 6, barHeight: '60%', distributed: true } },
    colors: COLORS.slice(2),
    dataLabels: { enabled: true, textAnchor: 'start', offsetX: 5, style: { fontSize: '11px', fontWeight: '500' }, formatter: v => fmtCur(v) },
    xaxis: { categories: revClientE.map(e => e[0]), labels: { formatter: v => fmt(+v) } },
    yaxis: { labels: { style: { fontSize: '11px' }, maxWidth: 160 } },
    grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } },
    legend: { show: false },
    tooltip: { y: { formatter: v => fmtCur(v) } }
  };

  // Chart 12: Quotes by Axess Product (count, similar to Top 10 Clients)
  const qsProdG = groupBy(d, 'Axess Product');
  const qsProdE = topN(Object.fromEntries(Object.entries(qsProdG).map(([k, v]) => [k, v.length])));
  const qsProdOpts = {
    chart: { type: 'bar', height: 280 },
    series: [{ data: qsProdE.map(e => e[1]) }],
    plotOptions: { bar: { horizontal: true, borderRadius: 6, barHeight: '60%', distributed: true } },
    colors: COLORS.slice(4),
    dataLabels: { enabled: true, formatter: v => v + ' quotes', style: { fontSize: '11px', fontWeight: '500' } },
    xaxis: { categories: qsProdE.map(e => e[0].length > 35 ? e[0].substring(0, 35) + '…' : e[0]) },
    yaxis: { labels: { style: { fontSize: '11px' }, maxWidth: 160 } },
    grid: { xaxis: { lines: { show: true } }, yaxis: { lines: { show: false } } },
    legend: { show: false },
    tooltip: { y: { formatter: v => v + ' quotes' } }
  };

  buildChartGrid('charts-quote', [
    { id: 'c-q-revcost', title: 'Revenue vs Cost over Time', tag: quoteTimePeriod, options: revCostOpts, wide: true },
    { id: 'c-q-clients', title: 'Top 10 Clients', tag: 'by Revenue', options: clientsOpts },
    { id: 'c-q-prob', title: 'Pipeline by Probability', options: probOpts },
    { id: 'c-q-products', title: 'Top Products', tag: 'by Revenue', options: productsOpts },
    { id: 'c-q-resp', title: 'Revenue by Responsible', options: respOpts },
    { id: 'c-q-timeline', title: 'Quotes Timeline', tag: 'by Quote Date — ' + timelineTag, options: timelineOpts, wide: true },
    { id: 'c-q-cmr', title: 'CMR % by Client', options: cmrOpts },
    { id: 'c-q-qsseg', title: 'Quotes by Segment', options: qsSegOpts },
    { id: 'c-q-wrseg', title: 'Win Rate by Segment', tag: 'Accepted / decided', options: wrSegOpts },
    { id: 'c-q-funnel', title: 'Sales Funnel', tag: 'by Status', options: funnelOpts },
    { id: 'c-q-treemap', title: 'Revenue by Segment', options: segRevOpts },
    { id: 'c-q-revclient', title: 'Revenue by Client', options: revClientOpts },
    { id: 'c-q-qsprod', title: 'Quotes by Axess Product', options: qsProdOpts }
  ]);

  // Inject controls into the Revenue vs Cost chart header
  requestAnimationFrame(() => {
    const chartCard = document.getElementById('c-q-revcost');
    if (chartCard) {
      const header = chartCard.parentElement.querySelector('.chart-header');
      if (header && !header.querySelector('.chart-controls')) {
        const controls = document.createElement('div');
        controls.className = 'chart-controls';

        // Period toggle
        const periodDiv = document.createElement('div');
        periodDiv.style.cssText = 'display:flex;gap:3px';
        ['week','month','year'].forEach(p => {
          const btn = document.createElement('button');
          btn.textContent = p.charAt(0).toUpperCase() + p.slice(1);
          btn.className = 'view-btn' + (quoteTimePeriod === p ? ' active' : '');
          btn.style.cssText = 'padding:4px 12px;font-size:10px;min-height:26px';
          btn.onclick = function() { quoteTimePeriod = p; renderQuote(); };
          periodDiv.appendChild(btn);
        });
        controls.appendChild(periodDiv);

        // Separator
        const sep = document.createElement('div');
        sep.style.cssText = 'width:1px;height:20px;background:var(--border-2)';
        controls.appendChild(sep);

        // Forecast checkbox
        const fcLabel = document.createElement('label');
        fcLabel.className = 'chart-toggle';
        fcLabel.innerHTML = '<input type="checkbox"' + (showForecast ? ' checked' : '') + '><span class="toggle-check"></span><span class="toggle-label" style="color:#8b5cf6">Forecast Backlog</span>';
        fcLabel.querySelector('input').onchange = function() { showForecast = this.checked; renderQuote(); };
        controls.appendChild(fcLabel);

        // Variance checkbox
        const vrLabel = document.createElement('label');
        vrLabel.className = 'chart-toggle';
        vrLabel.innerHTML = '<input type="checkbox"' + (showVariance ? ' checked' : '') + '><span class="toggle-check"></span><span class="toggle-label" style="color:#f43f5e">Variance %</span>';
        vrLabel.querySelector('input').onchange = function() { showVariance = this.checked; renderQuote(); };
        controls.appendChild(vrLabel);

        // Separator 2
        const sep2 = document.createElement('div');
        sep2.style.cssText = 'width:1px;height:20px;background:var(--border-2)';
        controls.appendChild(sep2);

        // Y-axis scale slider
        const sliderWrap = document.createElement('div');
        sliderWrap.className = 'scale-slider';
        sliderWrap.innerHTML =
          '<span>Y Scale</span>' +
          '<input type="range" min="5" max="100" value="' + revCostYMax + '" id="revcost-yscale">' +
          '<span class="scale-value" id="revcost-yscale-val">' + revCostYMax + '%</span>';
        const slider = sliderWrap.querySelector('input');
        const valLabel = sliderWrap.querySelector('.scale-value');
        slider.oninput = function() {
          valLabel.textContent = this.value + '%';
        };
        slider.onchange = function() {
          revCostYMax = +this.value;
          renderQuote();
        };
        controls.appendChild(sliderWrap);

        header.appendChild(controls);
      }
    }

    // Inject year buttons into the Quotes Timeline chart header
    const tlCard = document.getElementById('c-q-timeline');
    if (tlCard) {
      const tlHeader = tlCard.parentElement.querySelector('.chart-header');
      if (tlHeader && !tlHeader.querySelector('.chart-controls')) {
        const tlControls = document.createElement('div');
        tlControls.className = 'chart-controls';
        const yearDiv = document.createElement('div');
        yearDiv.style.cssText = 'display:flex;gap:3px';
        ['', '2024', '2025', '2026'].forEach(y => {
          const btn = document.createElement('button');
          btn.textContent = y || 'All';
          btn.className = 'view-btn' + (timelineYearFilter === y ? ' active' : '');
          btn.style.cssText = 'padding:4px 12px;font-size:10px;min-height:26px';
          btn.onclick = function() { timelineYearFilter = y; renderQuote(); };
          yearDiv.appendChild(btn);
        });
        tlControls.appendChild(yearDiv);
        tlHeader.appendChild(tlControls);
      }
    }
  });
}

// Budget & Forecast data by month (index 0=Jan, 11=Dec) — 2026 targets
const BUDGET_REV = [387192,647192,759375,889375,927263,969462,468279,382962,306435,356435,678434,893552];
const FORECAST_BACKLOG = [675732.40,674469.00,258334.99,149681.78,279993.09,954512.40,322726.40,149960.40,149960.40,149960.40,149960.40,777710.40];
const VARIANCE_PCT = [175,104,34,17,30,98,69,39,49,42,22,87];
const MONTH_LABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
let showForecast = false;
let showVariance = false;
let revCostChartData = []; // stores filtered quote data used by the chart
let revCostBucketKeys = []; // stores sorted bucket keys for drill-down index lookup
let timelineYearFilter = '';
let revCostYMax = 100; // percentage of auto max (10-100)

function buildRevCostChart(d) {
  const buckets = {};
  const bucketRows = {}; // store rows per bucket for drill-down
  d.forEach(r => {
    const dt = excelDate(r['Estimated Start Date']) || excelDate(r['Estimated start date']) || excelDate(r['Quote Date']);
    if (!dt) return;
    let key;
    if (quoteTimePeriod === 'week') {
      const day = dt.getDay() || 7;
      const mon = new Date(dt);
      mon.setDate(dt.getDate() - day + 1);
      key = mon.getFullYear() + '-W' + String(Math.ceil(((mon - new Date(mon.getFullYear(),0,1)) / 864e5 + 1) / 7)).padStart(2,'0');
    } else if (quoteTimePeriod === 'year') {
      key = String(dt.getFullYear());
    } else {
      key = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0');
    }
    if (!buckets[key]) { buckets[key] = { rev: 0, cost: 0, month: dt.getMonth(), year: dt.getFullYear() }; bucketRows[key] = []; }
    buckets[key].rev += (parseFloat(r['Sum Total']) || 0);
    buckets[key].cost += (parseFloat(r['Cost Sum Total']) || parseFloat(r['cost sum total']) || parseFloat(r['Cost Total']) || 0);
    bucketRows[key].push({ ...r, _date: dt });
  });
  const keys = Object.keys(buckets).sort();
  // Store for drill-down access
  revCostBucketKeys = keys;
  revCostChartData = bucketRows;

  // Helper: get monthly value from array, adapted to period
  function getMonthlyVal(arr, k, sumForYear) {
    if (quoteTimePeriod === 'month') return arr[buckets[k].month] || 0;
    if (quoteTimePeriod === 'year') return sumForYear ? arr.reduce((a, b) => a + b, 0) : avgArr(arr);
    return Math.round((arr[buckets[k].month] || 0) / 4.33); // week
  }
  function avgArr(a) { return a.reduce((s, v) => s + v, 0) / a.length; }

  const budgetData = keys.map(k => getMonthlyVal(BUDGET_REV, k, true));

  // Build series
  const series = [
    { name: 'Sum Total (Revenue)', type: 'bar', data: keys.map(k => Math.round(buckets[k].rev)) },
    { name: 'Cost Sum Total', type: 'bar', data: keys.map(k => Math.round(buckets[k].cost)) },
    { name: 'Budget Rev (Target)', type: 'line', data: budgetData }
  ];
  const colors = ['#2a9d8f', '#eab308', '#3b82f6'];
  const strokeW = [0, 0, 3];
  const dashArr = [0, 0, 5];
  const markerSizes = [0, 0, 5];

  if (showForecast) {
    const forecastData = keys.map(k => {
      // Only show for 2026 buckets
      if (buckets[k].year === 2026) return getMonthlyVal(FORECAST_BACKLOG, k, true);
      return null;
    });
    series.push({ name: 'Forecast Backlog (2026)', type: 'area', data: forecastData });
    colors.push('#8b5cf6');
    strokeW.push(2);
    dashArr.push(0);
    markerSizes.push(4);
  }

  if (showVariance) {
    const varianceData = keys.map(k => {
      if (buckets[k].year === 2026) return VARIANCE_PCT[buckets[k].month] || null;
      return null;
    });
    series.push({ name: 'Variance % (2026)', type: 'line', data: varianceData });
    colors.push('#f43f5e');
    strokeW.push(3);
    dashArr.push(0);
    markerSizes.push(5);
  }

  // Compute auto max from data, then apply slider scale
  const allVals = keys.flatMap(k => [buckets[k].rev, buckets[k].cost]).concat(budgetData);
  if (showForecast) keys.forEach(k => { if (buckets[k].year === 2026) allVals.push(FORECAST_BACKLOG[buckets[k].month] || 0); });
  const dataMax = Math.max(...allVals.filter(v => v != null && v > 0), 1);
  const scaledMax = revCostYMax < 100 ? Math.round(dataMax * (revCostYMax / 100)) : undefined;

  // Y-axes: main + optional secondary for variance %
  const yaxes = [{ labels: { formatter: v => fmtCur(v) }, title: { text: '' }, max: scaledMax, min: 0, forceNiceScale: !scaledMax }];
  if (showVariance) {
    yaxes.push({
      opposite: true,
      labels: { formatter: v => (v != null ? v.toFixed(0) + '%' : ''), style: { colors: '#f43f5e' } },
      title: { text: 'Variance %', style: { color: '#f43f5e', fontSize: '11px' } },
      min: 0, max: 200
    });
  }

  // Map series to yaxis index
  const yaxisMapping = series.map((s, i) => {
    if (s.name.includes('Variance')) return 1;
    return 0;
  });

  // Fill config for forecast area
  const fillConfig = { type: series.map(s => s.type === 'area' ? 'gradient' : 'solid') };
  if (showForecast) {
    fillConfig.gradient = { shadeIntensity: 1, opacityFrom: 0.3, opacityTo: 0.05, stops: [0, 90, 100] };
  }

  return {
    chart: {
      type: 'line', height: 310, zoom: { enabled: true, type: 'x' }, stacked: false,
      events: {
        dataPointSelection: function(event, chartContext, config) {
          // Only trigger for bar series (Revenue or Cost), not lines
          if (config.seriesIndex > 1) return;
          const dataPointIndex = config.dataPointIndex;
          if (dataPointIndex >= 0 && dataPointIndex < keys.length) {
            showQuoteDrilldown(keys[dataPointIndex]);
          }
        }
      }
    },
    series: series,
    colors: colors,
    stroke: { width: strokeW, curve: 'smooth', dashArray: dashArr },
    fill: fillConfig,
    plotOptions: { bar: { borderRadius: 5, columnWidth: keys.length > 20 ? '85%' : '55%', groupPadding: 0.1 } },
    markers: { size: markerSizes, strokeColors: '#fff', strokeWidth: 2, hover: { size: 7 } },
    dataLabels: { enabled: false },
    xaxis: { categories: keys, labels: { rotate: -45, rotateAlways: keys.length > 8, style: { fontSize: '10px' } } },
    yaxis: yaxes.length > 1 ? yaxes : yaxes[0],
    legend: { show: true, position: 'top', horizontalAlign: 'left', fontSize: '12px' },
    tooltip: {
      shared: true, intersect: false,
      y: { formatter: function(v, { seriesIndex }) {
        if (v == null) return '—';
        if (series[seriesIndex] && series[seriesIndex].name.includes('Variance')) return v.toFixed(0) + '%';
        return fmtCur(v);
      }}
    }
  };
}

// ─── QUOTE DRILL-DOWN ───
function showQuoteDrilldown(bucketKey) {
  const rows = revCostChartData[bucketKey];
  if (!rows || rows.length === 0) { toast('No data for this period', 'info'); return; }

  // Hide charts, show drilldown
  document.getElementById('charts-quote').style.display = 'none';
  const container = document.getElementById('quote-drilldown');
  container.style.display = '';

  const e = v => (v || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fmtD = v => { const d = excelDate(v) || parseDate(v); return d ? d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) : ''; };
  const fmtN = v => { const n = parseFloat(v); return isNaN(n) ? '' : n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); };

  // Period label
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let periodLabel = bucketKey;
  if (quoteTimePeriod === 'month' && bucketKey.includes('-')) {
    const [y, m] = bucketKey.split('-');
    periodLabel = MONTHS[parseInt(m, 10) - 1] + ' ' + y;
  }

  // Sort by Sum Total descending
  const sorted = [...rows].sort((a, b) => (parseFloat(b['Sum Total']) || 0) - (parseFloat(a['Sum Total']) || 0));

  // Totals
  const totalRev = sorted.reduce((s, r) => s + (parseFloat(r['Sum Total']) || 0), 0);
  const totalCost = sorted.reduce((s, r) => s + (parseFloat(r['Cost Sum Total']) || parseFloat(r['cost sum total']) || parseFloat(r['Cost Total']) || 0), 0);

  let html = '<div style="margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">' +
    '<button class="page-btn" onclick="closeQuoteDrilldown()" style="padding:6px 14px;font-size:12px;gap:6px;display:inline-flex;align-items:center" aria-label="Back to charts">' +
    '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>' +
    ' Back to charts</button>' +
    '<span style="font-size:15px;font-weight:700;color:var(--text)">Revenue vs Cost — ' + e(periodLabel) + '</span>' +
    '<span style="font-size:12px;color:var(--text-3);margin-left:auto">' + sorted.length + ' quotes &middot; Rev: ' + fmtCur(totalRev) + ' &middot; Cost: ' + fmtCur(totalCost) + '</span>' +
    '</div>';

  html += '<div style="overflow-x:auto;border-radius:var(--r);border:1px solid var(--glass-border);box-shadow:var(--sh)">';
  html += '<table class="equip-table" style="min-width:1080px"><thead><tr>';
  html += '<th>Year</th><th>Month</th><th>Sum Total</th><th>Cost Sum Total</th><th>CMR</th><th>Title</th><th>Job Title</th><th>Entity</th><th>Axess Product</th><th>Scope</th><th>Installation</th><th>Customer</th><th>Status</th><th>Responsible</th>';
  html += '</tr></thead><tbody>';

  // CMR helper — pull CMR Total from source (fallback CM Total). Display as % when value <= 1.
  const fmtCmr = v => {
    const n = parseFloat(v);
    if (isNaN(n) || n === 0) return '';
    return Math.abs(n) <= 1 ? (n * 100).toFixed(1) + '%' : n.toFixed(1) + '%';
  };
  const getCmr = r => {
    const candidates = [r['CMR Total'], r['CMR total'], r['CMR'], r['CM Total'], r['Contribution Margin']];
    for (const v of candidates) { if (v != null && v !== '') return v; }
    return '';
  };

  sorted.forEach(r => {
    const dt = r._date;
    const year = dt ? dt.getFullYear() : '';
    const month = dt ? MONTHS[dt.getMonth()] : '';
    const sumTotal = parseFloat(r['Sum Total']) || 0;
    const costTotal = parseFloat(r['Cost Sum Total']) || parseFloat(r['cost sum total']) || parseFloat(r['Cost Total']) || 0;
    const resp = (r['Responsible'] || '').split('@')[0].replace(/\./g, ' ').trim();

    html += '<tr>';
    html += '<td style="font-family:var(--font-mono);font-size:11px">' + year + '</td>';
    html += '<td>' + month + '</td>';
    html += '<td style="font-family:var(--font-mono);font-size:11px;text-align:right">' + fmtN(sumTotal) + '</td>';
    html += '<td style="font-family:var(--font-mono);font-size:11px;text-align:right">' + fmtN(costTotal) + '</td>';
    html += '<td style="font-family:var(--font-mono);font-size:11px;text-align:right">' + e(fmtCmr(getCmr(r))) + '</td>';
    html += '<td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + e(r['Title'] || r['Quote Title'] || '') + '">' + e(r['Title'] || r['Quote Title'] || '') + '</td>';
    html += '<td style="font-size:11px">' + e(r['Job Title'] || '') + '</td>';
    html += '<td style="font-size:11px">' + e(r['Entity'] || '') + '</td>';
    html += '<td style="font-size:11px">' + e(r['Axess Product'] || '') + '</td>';
    html += '<td style="font-size:11px">' + e(r['Scope'] || r['Segment'] || '') + '</td>';
    html += '<td>' + e(r['Installation'] || '') + '</td>';
    html += '<td>' + e(r['Customer'] || '') + '</td>';
    html += '<td>' + e(r['Status'] || '') + '</td>';
    html += '<td>' + e(resp) + '</td>';
    html += '</tr>';
  });

  // Totals row (avg CMR across rows with a CMR value)
  const cmrVals = sorted.map(r => parseFloat(getCmr(r))).filter(v => !isNaN(v) && v !== 0);
  const avgCmr = cmrVals.length ? cmrVals.reduce((a, b) => a + b, 0) / cmrVals.length : 0;
  html += '<tr style="font-weight:700;background:var(--bg-2)">';
  html += '<td colspan="2" style="text-align:right">TOTAL</td>';
  html += '<td style="font-family:var(--font-mono);font-size:11px;text-align:right">' + fmtN(totalRev) + '</td>';
  html += '<td style="font-family:var(--font-mono);font-size:11px;text-align:right">' + fmtN(totalCost) + '</td>';
  html += '<td style="font-family:var(--font-mono);font-size:11px;text-align:right">' + (cmrVals.length ? fmtCmr(avgCmr) : '') + '</td>';
  html += '<td colspan="9"></td>';
  html += '</tr>';

  html += '</tbody></table></div>';
  container.innerHTML = html;
  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeQuoteDrilldown() {
  document.getElementById('quote-drilldown').style.display = 'none';
  document.getElementById('quote-drilldown').innerHTML = '';
  document.getElementById('charts-quote').style.display = '';
}

// ─── PERSONNEL TAB ───
function personnelMandaysGoPrev() {
  personnelMandaysPage = Math.max(0, personnelMandaysPage - 1);
  renderPersonnelMandaysReport();
}
function personnelMandaysGoNext() {
  personnelMandaysPage++;
  renderPersonnelMandaysReport();
}

function renderPersonnelMandaysReport() {
  const PAGE_SIZE = 20;
  const d = state.personnel.filtered;
  const techFilter = (document.getElementById('p-mandays-tech') || {}).value || '';
  // Req 2: aggregate by technician only — installations live in the hover tooltip.
  const agg = {};
  d.forEach(r => {
    const name = (r['Technician Name'] || '').toString().trim();
    if (!name) return;
    if (techFilter && name !== techFilter) return;
    const inst = (r['Installation'] || '').toString().trim() || '(blank)';
    const s = excelDate(r['Start Date']), e = excelDate(r['End Date']);
    const days = (s && e) ? Math.max(0, Math.round((e.getTime() - s.getTime()) / 864e5)) : 0;
    if (!agg[name]) agg[name] = { name, totalDays: 0, byInst: {} };
    agg[name].totalDays += days;
    if (!agg[name].byInst[inst]) agg[name].byInst[inst] = { days: 0, ranges: [] };
    agg[name].byInst[inst].days += days;
    if (s && e) agg[name].byInst[inst].ranges.push({ s, e });
  });
  const list = Object.values(agg).sort((a, b) => b.totalDays - a.totalDays || a.name.localeCompare(b.name));
  const total = list.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  personnelMandaysPage = Math.min(Math.max(0, personnelMandaysPage), totalPages - 1);
  const start = personnelMandaysPage * PAGE_SIZE;
  const pageRows = list.slice(start, start + PAGE_SIZE);
  const rangeLo = total === 0 ? 0 : start + 1;
  const rangeHi = total === 0 ? 0 : Math.min(start + PAGE_SIZE, total);
  const summary = total === 0
    ? 'No rows'
    : ('Showing ' + rangeLo + '–' + rangeHi + ' of ' + total + ' technicians');
  const pageLabel = total === 0 ? '—' : ('Page ' + (personnelMandaysPage + 1) + ' / ' + totalPages);
  const prevDis = personnelMandaysPage <= 0;
  const nextDis = personnelMandaysPage >= totalPages - 1;
  const btnCss = 'padding:6px 12px;border-radius:var(--r-sm);border:1.5px solid var(--border-2);font-size:11px;font-weight:600;color:var(--text-2);background:var(--card);cursor:pointer;min-height:32px';
  function mdBtn(disabled, handler, label) {
    const st = btnCss + (disabled ? ';opacity:.45;cursor:not-allowed' : '');
    return '<button type="button" class="mandays-page-btn" style="' + st + '"' + (disabled ? ' disabled' : '') + ' onclick="' + handler + '">' + label + '</button>';
  }

  function fmtRange(r) {
    const opt = { day: '2-digit', month: 'short' };
    return r.s.toLocaleDateString('en-GB', opt) + ' → ' + r.e.toLocaleDateString('en-GB', opt);
  }
  function buildBreakdownHtml(o) {
    const entries = Object.entries(o.byInst).sort((a, b) => b[1].days - a[1].days);
    const items = entries.map(([inst, info]) => {
      const rangeStr = info.ranges.length ? info.ranges.map(fmtRange).join(' · ') : '—';
      return '<div style="display:flex;justify-content:space-between;gap:12px;padding:4px 0;border-bottom:1px dashed var(--border)">' +
        '<div style="min-width:0"><div style="font-size:11px;font-weight:700;color:var(--text)">' + esc(inst) + '</div>' +
        '<div style="font-size:10px;color:var(--text-3)">' + esc(rangeStr) + '</div></div>' +
        '<div style="font-family:var(--font-mono);font-weight:700;color:var(--brand-light);white-space:nowrap">' + fmtInt(info.days) + ' MD</div>' +
      '</div>';
    }).join('');
    return '<div style="font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Installations breakdown</div>' + (items || '<div style="font-size:11px;color:var(--text-3)">No installations</div>');
  }

  const rowHtml = pageRows.map(o => {
    const breakdown = buildBreakdownHtml(o);
    return '<tr class="mandays-row">' +
      '<td style="padding:8px">' + esc(o.name) + '</td>' +
      '<td style="text-align:right;padding:8px;font-variant-numeric:tabular-nums;font-family:var(--font-mono);font-weight:700">' + fmtInt(o.totalDays) + '</td>' +
      '<td style="padding:8px;text-align:right;color:var(--text-3);font-size:11px">' +
        '<span class="mandays-hover-tag" style="cursor:help;border-bottom:1px dotted var(--text-3)">hover for detail</span>' +
        '<div class="mandays-tip-payload">' + breakdown + '</div>' +
      '</td>' +
    '</tr>';
  }).join('');

  const sec = document.getElementById('personnel-mandays-section');
  if (!sec) return;
  sec.innerHTML =
    '<div class="chart-card"><div class="chart-header"><span class="chart-title">Man-Days report</span><span class="chart-tag">1 row per technician · hover for Installation breakdown</span></div>' +
    '<div style="overflow:auto;padding:0 16px 8px"><table class="mini-data-table mandays-table" style="width:100%;border-collapse:collapse;font-size:12px">' +
    '<thead><tr>' +
      '<th style="text-align:left;padding:8px;border-bottom:1px solid var(--border)">Technician</th>' +
      '<th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">Total Man-Days</th>' +
      '<th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">Detail</th>' +
    '</tr></thead>' +
    '<tbody>' + (rowHtml || '<tr><td colspan="3" style="padding:14px;color:var(--text-3);text-align:center">No rows</td></tr>') + '</tbody></table></div>' +
    '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:12px 16px 16px;border-top:1px solid var(--border)">' +
    '<span style="font-size:11px;color:var(--text-2)">' + esc(summary) + '</span>' +
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
    '<span style="font-size:11px;color:var(--text-3);font-family:var(--font-mono)">' + esc(pageLabel) + '</span>' +
    mdBtn(prevDis, 'personnelMandaysGoPrev()', 'Previous') +
    mdBtn(nextDis, 'personnelMandaysGoNext()', 'Next') +
    '</div></div></div>';

  // Floating tooltip (fixed-position, lives outside the scroll container so it never gets clipped).
  let tip = document.getElementById('mandays-floating-tip');
  if (!tip) {
    tip = document.createElement('div');
    tip.id = 'mandays-floating-tip';
    tip.className = 'mandays-tip-floating';
    tip.setAttribute('role', 'tooltip');
    tip.setAttribute('aria-hidden', 'true');
    document.body.appendChild(tip);
  }
  function positionMandaysTip(target) {
    const rect = target.getBoundingClientRect();
    tip.style.left = '0px';
    tip.style.top = '0px';
    tip.classList.add('visible');
    const tw = tip.offsetWidth;
    const th = tip.offsetHeight;
    let left = Math.max(8, Math.min(window.innerWidth - tw - 8, rect.right - tw));
    let top = rect.bottom + 6;
    if (top + th + 8 > window.innerHeight) top = Math.max(8, rect.top - th - 6);
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
  }
  sec.querySelectorAll('.mandays-row').forEach(row => {
    const payload = row.querySelector('.mandays-tip-payload');
    if (!payload) return;
    const html = payload.innerHTML;
    row.addEventListener('mouseenter', () => {
      tip.innerHTML = html;
      tip.setAttribute('aria-hidden', 'false');
      positionMandaysTip(row);
    });
    row.addEventListener('mousemove', () => {
      if (tip.classList.contains('visible')) positionMandaysTip(row);
    });
    row.addEventListener('mouseleave', () => {
      tip.classList.remove('visible');
      tip.setAttribute('aria-hidden', 'true');
    });
  });
}

function renderPersonnel() {
  const d = state.personnel.filtered;

  const pgs = document.getElementById('personnel-group-summary');
  if (pgs) {
    if (!personnelGroupBy) {
      pgs.innerHTML = '';
    } else {
      const gg = groupBy(d, personnelGroupBy);
      const rows = Object.keys(gg).sort((a, b) => gg[b].length - gg[a].length).map(k => {
        const rowsK = gg[k];
        let md = 0;
        rowsK.forEach(r => {
          const s = excelDate(r['Start Date']), e = excelDate(r['End Date']);
          if (s && e) md += Math.max(0, Math.round((e.getTime() - s.getTime()) / 864e5));
        });
        return '<tr><td>' + esc(k) + '</td><td style="text-align:right;font-variant-numeric:tabular-nums">' + fmtInt(rowsK.length) + '</td><td style="text-align:right;font-variant-numeric:tabular-nums">' + fmtInt(md) + '</td></tr>';
      }).join('');
      pgs.innerHTML =
        '<div class="chart-card" style="margin-bottom:16px"><div class="chart-header"><span class="chart-title">Grouped summary</span><span class="chart-tag">' + esc(personnelGroupBy) + '</span></div>' +
        '<div style="overflow:auto;padding:0 16px 16px"><table class="mini-data-table" style="width:100%;border-collapse:collapse;font-size:12px">' +
        '<thead><tr><th style="text-align:left;padding:8px;border-bottom:1px solid var(--border)">' + esc(personnelGroupBy) + '</th><th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">Assignments</th><th style="text-align:right;padding:8px;border-bottom:1px solid var(--border)">Man-days</th></tr></thead>' +
        '<tbody>' + rows + '</tbody></table></div></div>';
    }
  }

  const totalDays = d.length; // aligns with DAX COUNTROWS('Planner Dates')
  const allTechs = [...new Set(d.map(r => (r['Technician Name'] || '').toString().trim()).filter(Boolean))];
  const activeTechnicians = allTechs.length; // aligns with DAX DISTINCTCOUNT('Technician Name')

  // Personnel Planner template: Local / Regional / Expat
  const supportOrder = ['Expat', 'Local', 'Regional'];
  const supportManDays = {};
  const supportActiveTechsSet = {};
  supportOrder.forEach(s => { supportManDays[s] = 0; supportActiveTechsSet[s] = new Set(); });

  d.forEach(r => {
    const clsRaw = (r['Support Classification'] || '').toString().trim();
    const clsLower = clsRaw.toLowerCase();
    const st = supportOrder.find(s => s.toLowerCase() === clsLower) || null;
    if (!st) return;
    supportManDays[st] = (supportManDays[st] || 0) + 1;
    const tech = (r['Technician Name'] || '').toString().trim();
    if (tech) supportActiveTechsSet[st].add(tech);
  });

  const supportActiveTechs = {};
  supportOrder.forEach(s => { supportActiveTechs[s] = supportActiveTechsSet[s].size; });

  // Ensure Expat + Local + Regional add up to 100%.
  const supportedTotalDays = supportOrder.reduce((acc, s) => acc + (supportManDays[s] || 0), 0) || 0;
  const manDaysLocal = supportManDays['Local'] || 0;
  const utilizationLocalPct = supportedTotalDays > 0 ? (manDaysLocal / supportedTotalDays) * 100 : 0;

  const utilizationBySupport = {};
  supportOrder.forEach(s => {
    utilizationBySupport[s] = supportedTotalDays > 0 ? ((supportManDays[s] || 0) / supportedTotalDays) * 100 : 0;
  });

  // Resources assigned to Client/Installation: distinct active technicians per group
  function distinctCountByGroup(key) {
    const m = {};
    d.forEach(r => {
      const g = (r[key] || '').toString().trim() || '(blank)';
      const tech = (r['Technician Name'] || '').toString().trim();
      if (!tech) return;
      if (!m[g]) m[g] = new Set();
      m[g].add(tech);
    });
    return Object.entries(m).map(([k, set]) => ({ label: k, value: set.size }));
  }
  const clientItems = distinctCountByGroup('Client').sort((a, b) => b.value - a.value);
  const installationItems = distinctCountByGroup('Installation').sort((a, b) => b.value - a.value);
  const clientTop = clientItems.slice(0, 6);
  const installationTop = installationItems.slice(0, 6);

  const kpi = document.getElementById('kpi-personnel');
  // Override: this container is defined as `.kpi-row` (5-col grid), but Personnel uses a custom layout.
  kpi.classList.remove('kpi-row');
  kpi.style.display = 'block';
  kpi.innerHTML = '';

  // Rounded percentages that (when possible) sum to exactly 100.
  const utilRounded = supportOrder.map(s => utilizationBySupport[s]);
  const utilRoundedInt = utilRounded.map(v => Math.round(v));
  if (utilRoundedInt.length >= 2) {
    const sumFirst = utilRoundedInt.slice(0, -1).reduce((a, b) => a + b, 0);
    utilRoundedInt[utilRoundedInt.length - 1] = Math.max(0, 100 - sumFirst);
  }
  const utilBoxes = supportOrder.map((s, idx) => {
    return '<div class="pers-mini-box">' +
      '<div class="pers-mini-label">' + esc(s) + '</div>' +
      '<div class="pers-mini-value">' + utilRoundedInt[idx] + '%</div>' +
    '</div>';
  }).join('');

  const manDaysBoxes = supportOrder.map(s => {
    return '<div class="pers-mini-box">' +
      '<div class="pers-mini-label">' + esc(s) + '</div>' +
      '<div class="pers-mini-value">' + fmtInt(supportManDays[s] || 0) + '</div>' +
    '</div>';
  }).join('');

  const resBoxes = supportOrder.map(s => {
    return '<div class="pers-mini-box">' +
      '<div class="pers-mini-label">' + esc(s) + '</div>' +
      '<div class="pers-mini-value">' + fmtInt(supportActiveTechs[s] || 0) + '</div>' +
    '</div>';
  }).join('');

  const listClientRows = clientTop.map(it => {
    return '<div class="pers-list-row"><div class="num">' + fmtInt(it.value) + '</div><div class="name">' + esc(it.label) + '</div></div>';
  }).join('');

  const listInstallationRows = installationTop.map(it => {
    return '<div class="pers-list-row clickable" onclick="showVesselMap(\'' + esc(it.label).replace(/'/g, "\\'") + '\', this)" title="Click to see vessel location"><div class="num">' + fmtInt(it.value) + '</div><div class="name">' + esc(it.label) + '</div></div>';
  }).join('');

  kpi.innerHTML = ''
    + '<div class="pers-overview-grid">'
    +   '<div class="pers-card">'
    +     '<div class="pers-card-title">Utilization</div>'
    +     '<div class="pers-mini-grid">' + utilBoxes + '</div>'
    +   '</div>'
    +   '<div class="pers-card">'
    +     '<div class="pers-card-title">Man Days</div>'
    +     '<div class="pers-mini-grid">' + manDaysBoxes + '</div>'
    +   '</div>'
    +   '<div class="pers-card">'
    +     '<div class="pers-card-title">Resources</div>'
    +     '<div class="pers-mini-grid">' + resBoxes + '</div>'
    +   '</div>'
    + '</div>';

  const resourcesView = document.getElementById('personnel-resources-view');
  if (resourcesView) {
    resourcesView.innerHTML = ''
      + '<div class="pers-bottom-grid">'
      +   '<div class="pers-card pers-list-card">'
      +     '<div class="pers-card-title" style="margin-bottom:10px">Resources assigned to Client</div>'
      +     '<div class="pers-list-head"><span>Active Technicians</span><span style="justify-self:end">Client</span></div>'
      +     '<div class="pers-list-rows">' + (listClientRows || '<div class="pers-list-row"><div class="num">0</div><div class="name">(blank)</div></div>') + '</div>'
      +     '<div class="pers-list-footer">Total: ' + fmtInt(activeTechnicians) + '</div>'
      +   '</div>'
      +   '<div class="pers-card pers-list-card">'
      +     '<div class="pers-card-title" style="margin-bottom:10px">Resources assigned to Installation</div>'
      +     '<div class="pers-list-head"><span>Active Technicians</span><span style="justify-self:end">Installation</span></div>'
      +     '<div class="pers-list-rows">' + (listInstallationRows || '<div class="pers-list-row"><div class="num">0</div><div class="name">(blank)</div></div>') + '</div>'
      +     '<div class="pers-list-footer">Total: ' + fmtInt(activeTechnicians) + '</div>'
      +   '</div>'
      + '</div>';
  }

  if (personnelView === 'gantt') {
    renderGantt(d);
    document.getElementById('charts-personnel').style.display = 'none';
    document.getElementById('personnel-gantt-view').style.display = '';
  } else {
    document.getElementById('personnel-gantt-view').innerHTML = '';
    document.getElementById('charts-personnel').style.display = '';
    renderPersonnelCharts(d);
  }
  populateMandaysTechFilter();
  renderPersonnelMandaysReport();
}

  else if (mode === 'installation') personnelGanttGroupBy = 'scope';

function getPersonnelGanttColumnHeaderText() {
  if (personnelGanttAggregate) {
    return personnelGanttGroupBy === 'scope' ? 'Scope / Technician' : 'Installation / Technician';
  }
  const h = personnelGanttHierarchy;
  const g = personnelGanttGroupBy;
  if (h === 'personnel') return g === 'installation' ? 'Personnel / Installation / Scope' : 'Personnel / Scope / Installation';
  if (h === 'installation') return g === 'scope' ? 'Installation / Scope / Personnel' : 'Installation / Personnel / Scope';
  return g === 'personnel' ? 'Scope / Personnel' : 'Scope / Installation / Personnel';
}

function buildVesselEmbedUrl(name) {
  const key = name.trim().toLowerCase();
  const mmsi = vesselMMSI[key];
  let url = 'https://www.vesselfinder.com/aismap?width=100%25&height=450&names=true&clicktoact=true&default_ais=1&store=true';
  if (mmsi) {
    url += '&mmsi=' + mmsi + '&zoom=7';
  } else {

  }

function buildVesselSearchUrl(name) {
  return 'https://www.vesselfinder.com/vessels?name=' + encodeURIComponent(name.trim());
}
function showVesselMap(installationName, rowEl) {
  if (!installationName || installationName === '(blank)') return;
  if (activeVesselRow) activeVesselRow.classList.remove('active');
  if (activeVesselRow === rowEl) { closeVesselMap(); return; }
  activeVesselRow = rowEl;
  rowEl.classList.add('active');
  const embedUrl = buildVesselEmbedUrl(installationName);
  const searchUrl = buildVesselSearchUrl(installationName);
  const wrapper = document.getElementById('vessel-map-wrapper');
  const frame = document.getElementById('vessel-map-frame');

  const fallback = document.getElementById('vessel-map-fallback');

function closeVesselMap() {
  const wrapper = document.getElementById('vessel-map-wrapper');
  const frame = document.getElementById('vessel-map-frame');
  wrapper.style.display = 'none';
  frame.src = 'about:blank';
  if (activeVesselRow) { activeVesselRow.classList.remove('active'); activeVesselRow = null; }
}

// ─── GANTT CHART (Personnel) ───
// By Personnel: Personnel → Installation → Scope
function buildHierarchyByPersonnel(techMap, techNames) {
  const rows = [];
  techNames.forEach((techName, ti) => {
    const tasks = techMap[techName];
    const byInstall = {};
    tasks.forEach(t => {
      const inst = (t.install || '').trim() || '(No installation)';
      const sc = (t.scope || '').trim() || '(No scope)';
      if (!byInstall[inst]) byInstall[inst] = {};
      if (!byInstall[inst][sc]) byInstall[inst][sc] = [];
      byInstall[inst][sc].push(t);
    });
    rows.push({ kind: 'tech', ti, techName, tasks });
    const installs = Object.keys(byInstall).sort();
    installs.forEach((inst, ii) => {
      const projKey = ti + '-' + ii;
      const projTasks = Object.values(byInstall[inst]).flat();
      rows.push({ kind: 'project', ti, projKey, client: inst, tasks: projTasks });
      const scopes = Object.keys(byInstall[inst]).sort();
      scopes.forEach(scope => {
        rows.push({ kind: 'scope', ti, projKey, scope, tasks: byInstall[inst][scope] });
      });
    });
  });
  return rows;
}
// By Scope: Scope → Personnel
function buildHierarchyByScope(techMap, techNames) {
  const tree = {};
  techNames.forEach(techName => {
    techMap[techName].forEach(t => {
      const sc = (t.scope || '').trim() || '(No scope)';
      if (!tree[sc]) tree[sc] = {};
      if (!tree[sc][techName]) tree[sc][techName] = [];
      tree[sc][techName].push(t);
    });
  });
  const rows = [];
  Object.keys(tree).sort().forEach((scope, si) => {
    const allTasks = Object.values(tree[scope]).flat();
    rows.push({ kind: 'tech', ti: si, techName: scope, tasks: allTasks });
    Object.keys(tree[scope]).sort().forEach(tech => {
      rows.push({ kind: 'project', ti: si, projKey: si + '-0', client: tech, tasks: tree[scope][tech] });
    });
  });
  return rows;
}
// By Personnel + group by Scope first: Personnel → Scope → Installation
function buildHierarchyByPersonnelGrouped(techMap, techNames, groupBy) {
  if (groupBy === 'installation') return buildHierarchyByPersonnel(techMap, techNames);
  const rows = [];
  techNames.forEach((techName, ti) => {
    const tasks = techMap[techName];
    const byScope = {};
    tasks.forEach(t => {
      const inst = (t.install || '').trim() || '(No installation)';
      const sc = (t.scope || '').trim() || '(No scope)';
      if (!byScope[sc]) byScope[sc] = {};
      if (!byScope[sc][inst]) byScope[sc][inst] = [];
      byScope[sc][inst].push(t);
    });
    rows.push({ kind: 'tech', ti, techName, tasks });
    Object.keys(byScope).sort().forEach((sc, si) => {
      const projKey = ti + '-s-' + si;
      const projTasks = Object.values(byScope[sc]).flat();
      rows.push({ kind: 'project', ti, projKey, client: sc, tasks: projTasks });
      Object.keys(byScope[sc]).sort().forEach(inst => {
        rows.push({ kind: 'scope', ti, projKey, scope: inst, tasks: byScope[sc][inst] });
      });
    });
  });
  return rows;
}
// By Installation + optional grouping: Scope→Personnel (default) or Personnel→Scope
function buildHierarchyByInstallationGrouped(techMap, techNames, groupBy) {
  const tree = {};
  techNames.forEach(techName => {
    techMap[techName].forEach(t => {
      const inst = (t.install || '').trim() || '(No installation)';
      const sc = (t.scope || '').trim() || '(No scope)';
      if (!tree[inst]) tree[inst] = {};
      if (!tree[inst][sc]) tree[inst][sc] = {};
      if (!tree[inst][sc][techName]) tree[inst][sc][techName] = [];
      tree[inst][sc][techName].push(t);
    });
  });
  const rows = [];
  Object.keys(tree).sort().forEach((inst, ii) => {
    const allTasks = [];
    Object.values(tree[inst]).forEach(scopes => Object.values(scopes).forEach(tasks => allTasks.push(...tasks)));
    rows.push({ kind: 'tech', ti: ii, techName: inst, tasks: allTasks });
    if (groupBy === 'scope') {
      Object.keys(tree[inst]).sort().forEach((scope, si) => {
        const projKey = ii + '-' + si;
        const scopeTasks = Object.values(tree[inst][scope]).flat();
        rows.push({ kind: 'project', ti: ii, projKey, client: scope, tasks: scopeTasks });
        Object.keys(tree[inst][scope]).sort().forEach(tech => {
          rows.push({ kind: 'scope', ti: ii, projKey, scope: tech, tasks: tree[inst][scope][tech] });
        });
      });
    } else {
      const techSet = {};
      Object.keys(tree[inst]).sort().forEach(scope => {
        Object.keys(tree[inst][scope]).sort().forEach(tech => {
          if (!techSet[tech]) techSet[tech] = [];
          techSet[tech].push(...tree[inst][scope][tech]);
        });
      });
      Object.keys(techSet).sort().forEach((tech, pi) => {
        const projKey = ii + '-p-' + pi;
        rows.push({ kind: 'project', ti: ii, projKey, client: tech, tasks: techSet[tech] });
        Object.keys(tree[inst]).sort().forEach(scope => {
          if (tree[inst][scope][tech]) {
            rows.push({ kind: 'scope', ti: ii, projKey, scope: scope, tasks: tree[inst][scope][tech] });
          }
        });
      });
    }
  });
  return rows;
}
// By Scope + optional grouping: Personnel only (2 levels) or Installation→Personnel (3 levels)
function buildHierarchyByScopeGrouped(techMap, techNames, groupBy) {
  if (groupBy === 'personnel') return buildHierarchyByScope(techMap, techNames);
  const tree = {};
  techNames.forEach(techName => {
    techMap[techName].forEach(t => {
      const sc = (t.scope || '').trim() || '(No scope)';
      const inst = (t.install || '').trim() || '(No installation)';
      if (!tree[sc]) tree[sc] = {};
      if (!tree[sc][inst]) tree[sc][inst] = {};
      if (!tree[sc][inst][techName]) tree[sc][inst][techName] = [];
      tree[sc][inst][techName].push(t);
    });
  });
  const rows = [];
  Object.keys(tree).sort().forEach((scope, si) => {
    const allTasks = [];
    Object.values(tree[scope]).forEach(instMap => Object.values(instMap).forEach(tasks => allTasks.push(...tasks)));
    rows.push({ kind: 'tech', ti: si, techName: scope, tasks: allTasks });
    Object.keys(tree[scope]).sort().forEach((inst, ii2) => {
      const projKey = si + '-i-' + ii2;
      const projTasks = Object.values(tree[scope][inst]).flat();
      rows.push({ kind: 'project', ti: si, projKey, client: inst, tasks: projTasks });
      Object.keys(tree[scope][inst]).sort().forEach(tech => {
        rows.push({ kind: 'scope', ti: si, projKey, scope: tech, tasks: tree[scope][inst][tech] });
      });
    });
  });
  return rows;
}

/** Group by checkbox: one row per Installation or Scope, technicians nested underneath. */
function buildAggregateHierarchyByInstallation(techMap, techNames) {
  const instToTechs = {};
  techNames.forEach(name => {
    techMap[name].forEach(t => {
      const inst = (t.install || '').trim() || '(No installation)';
      if (!instToTechs[inst]) instToTechs[inst] = {};
      if (!instToTechs[inst][name]) instToTechs[inst][name] = [];
      instToTechs[inst][name].push(t);
    });
  });
  const rows = [];
  Object.keys(instToTechs).sort().forEach((inst, ii) => {
    const allTasks = [];
    Object.values(instToTechs[inst]).forEach(arr => allTasks.push(...arr));
    rows.push({ kind: 'tech', ti: ii, techName: inst, tasks: allTasks });
    Object.keys(instToTechs[inst]).sort().forEach((techName, pi) => {
      const projKey = 'agi-' + ii + '-' + pi;
      rows.push({ kind: 'project', ti: ii, projKey, client: techName, tasks: instToTechs[inst][techName], rootName: inst });
    });
  });
  return rows;
}
function buildAggregateHierarchyByScope(techMap, techNames) {
  const scopeToTechs = {};
  techNames.forEach(name => {
    techMap[name].forEach(t => {
      const sc = (t.scope || '').trim() || '(No scope)';
      if (!scopeToTechs[sc]) scopeToTechs[sc] = {};
      if (!scopeToTechs[sc][name]) scopeToTechs[sc][name] = [];
      scopeToTechs[sc][name].push(t);
    });
  });
  const rows = [];
  Object.keys(scopeToTechs).sort().forEach((sc, si) => {
    const allTasks = [];
    Object.values(scopeToTechs[sc]).forEach(arr => allTasks.push(...arr));
    rows.push({ kind: 'tech', ti: si, techName: sc, tasks: allTasks });
    Object.keys(scopeToTechs[sc]).sort().forEach((techName, pi) => {
      const projKey = 'ags-' + si + '-' + pi;
      rows.push({ kind: 'project', ti: si, projKey, client: techName, tasks: scopeToTechs[sc][techName], rootName: sc });
    });
  });
  return rows;
}

function renderPersonnelGanttRowBars(rowEl, opts) {
  const { labelName, tasks, minDate, totalDays, dayMs, dayWidth, clientColors, showAvailable } = opts;
  if (showAvailable) {
    const covered = new Array(totalDays).fill(false);
    tasks.forEach(t => {
      let a = Math.floor((t.start - minDate) / dayMs);
      let b = Math.ceil((t.end - minDate) / dayMs);
      if (!Number.isFinite(a)) a = 0;
      if (!Number.isFinite(b) || b <= a) b = a + 1;
      for (let i = Math.max(0, a); i < Math.min(totalDays, b); i++) covered[i] = true;
    });
    for (let i = 0; i < totalDays; i++) {
      if (covered[i]) continue;
      let j = i;
      while (j < totalDays && !covered[j]) j++;
      const av = document.createElement('div');
      av.className = 'gantt-bar gantt-bar-available';
      av.style.left = (i * dayWidth) + 'px';
      av.style.width = Math.max(dayWidth, (j - i) * dayWidth) + 'px';
      av.style.background = getStatusColor('Available');
      av.style.color = '#0b1220';
      av.textContent = 'Available';
      av.title = labelName + '\nAvailable\n' + new Date(minDate.getTime() + i * dayMs).toLocaleDateString('en-GB') + ' → ' + new Date(minDate.getTime() + (j - 1) * dayMs).toLocaleDateString('en-GB');
      av.setAttribute('role', 'img');
      av.setAttribute('aria-label', labelName + ': Available from ' + new Date(minDate.getTime() + i * dayMs).toLocaleDateString('en-GB') + ' to ' + new Date(minDate.getTime() + (j - 1) * dayMs).toLocaleDateString('en-GB'));
      rowEl.appendChild(av);
      i = j - 1;
    }
  }
  tasks.forEach(t => {
    const startOff = Math.max(0, (t.start - minDate) / dayMs);
    const dur = Math.max(1, (t.end - t.start) / dayMs);
    const bar = document.createElement('div');
    bar.className = 'gantt-bar gantt-bar-assignment';
    bar.style.left = (startOff * dayWidth) + 'px';
    bar.style.width = (dur * dayWidth) + 'px';
    bar.style.background = getStatusColor(t.status);
    const clientPart = (t.client || t.install || '').trim();
    const scopePart = (t.scope || '').trim();
    bar.textContent = scopePart ? (clientPart ? clientPart + ' - ' + scopePart : scopePart) : (clientPart || t.install);
    bar.title = labelName + '\n' + (clientPart || '(no client)') + (scopePart ? '\nScope: ' + scopePart : '') + '\n' + t.install + '\n' + t.start.toLocaleDateString('en-GB') + ' → ' + t.end.toLocaleDateString('en-GB') + '\n' + t.status;
    bar.setAttribute('role', 'img');
    bar.setAttribute('aria-label', labelName + ': ' + bar.textContent + ', ' + t.start.toLocaleDateString('en-GB') + ' to ' + t.end.toLocaleDateString('en-GB'));
    rowEl.appendChild(bar);
  });
}

function renderGantt(data) {
  const container = document.getElementById('personnel-gantt-view');
  container.innerHTML = '';

  const techMap = {};
  data.forEach(r => {
    const name = (r['Technician Name'] || '').toString().trim();
    if (!name) return;
    const s = excelDate(r['Start Date']), e = excelDate(r['End Date']);
    if (!s || !e) return;
    if (!techMap[name]) techMap[name] = [];
    techMap[name].push({
      start: s, end: e,
      client: (r['Client'] || '').toString().trim(),
      scope: (r['Scope'] || r['scope'] || '').toString().trim(),
      install: (r['Installation'] || '').toString().trim(),
      status: (r['Status'] || '').toString().trim()
    });
  });

  // Req 1: ensure all known technicians appear in the Gantt, even when
  // the active filters yield no assignments for them in the visible window.
  // Empty-task techs will render as a single "Available" bar covering the range.
  const allRawTechs = (state.personnel.raw || []);
  allRawTechs.forEach(r => {
    const name = (r['Technician Name'] || '').toString().trim();
    if (!name) return;
    if (!techMap[name]) techMap[name] = [];
  });

  const techNames = Object.keys(techMap).sort();
  if (techNames.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="4" rx="1"/><rect x="3" y="10" width="12" height="4" rx="1"/><rect x="3" y="16" width="15" height="4" rx="1"/></svg></div><div class="empty-title">No Gantt Data</div><div class="empty-desc">No valid date ranges found in filtered data.</div></div>';
    return;
  }

  let hierarchyRows;
  if (personnelGanttAggregate) {
    hierarchyRows = personnelGanttGroupBy === 'scope'
      ? buildAggregateHierarchyByScope(techMap, techNames)
      : buildAggregateHierarchyByInstallation(techMap, techNames);
  } else {
    hierarchyRows = personnelGanttHierarchy === 'installation'
      ? buildHierarchyByInstallationGrouped(techMap, techNames, personnelGanttGroupBy)
      : personnelGanttHierarchy === 'scope'
      ? buildHierarchyByScopeGrouped(techMap, techNames, personnelGanttGroupBy)
      : buildHierarchyByPersonnelGrouped(techMap, techNames, personnelGanttGroupBy);

  let minDate = new Date(9999, 0, 1), maxDate = new Date(0);

    if (t.start < minDate) minDate = new Date(t.start);
    if (t.end > maxDate) maxDate = new Date(t.end);
