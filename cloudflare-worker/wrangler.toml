name = "axess-gy-auth"
main = "src/index.js"
compatibility_date = "2026-01-01"
workers_dev = true

# ── KV namespace ──
# Create with:  npx wrangler kv namespace create USERS
# Then paste the resulting id below (do NOT commit the preview_id from a personal account).
[[kv_namespaces]]
binding = "USERS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# ── Allowed CORS origin(s) ──
# Comma-separated if multiple (e.g. github.io fallback + custom domain).
[vars]
ALLOWED_ORIGIN = "https://axess.olmoraia.com,https://olmoraia.github.io"

# ── Secrets ──
# JWT_SECRET is set out-of-band:
#   npx wrangler secret put JWT_SECRET
# Use a random 48+ char value, e.g.: openssl rand -base64 48
