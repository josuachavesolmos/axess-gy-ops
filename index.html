<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Axess GY · Sign in</title>
<meta name="axess-auth-worker" content="https://axess-gy-auth.REPLACE.workers.dev">
<style>
  :root{
    --brand:#00636d; --brand-light:#009aa6; --brand-glow:#33b8c2;
    --warm:#e98300; --success:#7ab800; --info:#589199;
    --text:#111827; --text-2:#4D5357; --text-3:#6b7280;
    --bg:#f0f2f5; --card:#ffffff; --border:#e5e7eb; --border-2:#d1d5db;
    --shadow:0 10px 40px rgba(0,99,109,.12); --r:14px; --r-sm:10px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:'Trebuchet MS','Century Gothic',Arial,sans-serif;
       background:linear-gradient(135deg,#e8f4f6 0%,#f0f2f5 100%);
       color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px}
  .auth-card{width:100%;max-width:400px;background:var(--card);border-radius:var(--r);
             padding:36px 32px 28px;box-shadow:var(--shadow);border:1px solid var(--border)}
  .brand{display:flex;align-items:center;justify-content:center;flex-direction:column;
         margin-bottom:24px}
  .brand-logo{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--brand),var(--brand-glow));
              display:flex;align-items:center;justify-content:center;margin-bottom:14px;
              box-shadow:0 6px 18px rgba(0,99,109,.25)}
  .brand-logo svg{width:32px;height:32px;color:#fff}
  .brand-title{font-size:18px;font-weight:700;color:var(--text);margin:0;letter-spacing:.2px}
  .brand-sub{font-size:12px;color:var(--text-3);margin-top:4px;font-weight:500}
  .form-group{margin-bottom:14px}
  label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;
        letter-spacing:.6px;color:var(--text-2);margin-bottom:6px}
  input[type="text"],input[type="password"]{
    width:100%;padding:11px 13px;font-size:14px;font-family:inherit;
    border:1.5px solid var(--border-2);border-radius:var(--r-sm);
    background:var(--bg);color:var(--text);transition:all .15s;outline:none}
  input[type="text"]:focus,input[type="password"]:focus{
    border-color:var(--brand-light);background:var(--card);
    box-shadow:0 0 0 3px rgba(0,154,166,.12)}
  .remember{display:flex;align-items:center;gap:8px;margin:14px 0 18px;font-size:13px;color:var(--text-2);cursor:pointer;user-select:none}
  .remember input{accent-color:var(--brand);width:16px;height:16px;cursor:pointer}
  button{width:100%;padding:12px;font-size:14px;font-weight:600;font-family:inherit;
         background:var(--brand);color:#fff;border:none;border-radius:var(--r-sm);
         cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
  button:hover:not(:disabled){background:var(--brand-light);transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,99,109,.3)}
  button:disabled{opacity:.6;cursor:wait}
  .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
  button.loading .spinner{display:inline-block}
  button.loading .btn-label{opacity:.7}
  @keyframes spin{to{transform:rotate(360deg)}}
  .error-box{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;
             padding:10px 12px;border-radius:var(--r-sm);font-size:12px;
             margin-bottom:14px;display:none;line-height:1.4}
  .error-box.show{display:flex;align-items:flex-start;gap:8px}
  .error-box svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}
  .info-box{background:#fef3c7;border:1px solid #fde68a;color:#78350f;
             padding:10px 12px;border-radius:var(--r-sm);font-size:12px;
             margin-bottom:14px;display:none;line-height:1.4}
  .info-box.show{display:flex;align-items:flex-start;gap:8px}
  .info-box svg{width:14px;height:14px;flex-shrink:0;margin-top:1px}
  .footer{margin-top:22px;padding-top:18px;border-top:1px solid var(--border);
          text-align:center;font-size:11px;color:var(--text-3);line-height:1.5}
  .footer a{color:var(--brand);text-decoration:none;font-weight:600}
  .footer a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="auth-card" role="main">
  <div class="brand">
    <div class="brand-logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1.5"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5"/>
      </svg>
    </div>
    <h1 class="brand-title">Axess GY Dashboard</h1>
    <p class="brand-sub">Guyana Operations · Sign in to continue</p>
  </div>

  <div id="info-box" class="info-box" role="status">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span id="info-msg"></span>
  </div>

  <div id="error-box" class="error-box" role="alert">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
    <span id="error-msg"></span>
  </div>

  <form id="login-form" autocomplete="on" novalidate>
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required autocapitalize="none" spellcheck="false">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <label class="remember">
      <input id="remember" type="checkbox">
      <span>Keep me signed in for 30 days</span>
    </label>
    <button type="submit" id="submit-btn">
      <span class="spinner" aria-hidden="true"></span>
      <span class="btn-label">Sign in</span>
    </button>
  </form>

  <div class="footer">
    Forgot your password? Contact <a href="mailto:contact@olmoraia.com?subject=Axess%20GY%20Dashboard%20-%20Password%20reset">contact@olmoraia.com</a><br>
    <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-3)">v5 · Powered by Olmoraia</span>
  </div>
</div>

<script src="auth.js"></script>
<script>
(function () {
  'use strict';
  const form = document.getElementById('login-form');
  const userIn = document.getElementById('username');
  const passIn = document.getElementById('password');
  const remember = document.getElementById('remember');
  const submitBtn = document.getElementById('submit-btn');
  const errBox = document.getElementById('error-box');
  const errMsg = document.getElementById('error-msg');
  const infoBox = document.getElementById('info-box');
  const infoMsg = document.getElementById('info-msg');

  function showError(msg) {
    errMsg.textContent = msg;
    errBox.classList.add('show');
    infoBox.classList.remove('show');
  }
  function clearError() { errBox.classList.remove('show'); }
  function showInfo(msg) {
    infoMsg.textContent = msg;
    infoBox.classList.add('show');
  }

  // Handle query params (?reason=expired, ?next=...)
  const params = new URLSearchParams(window.location.search);
  if (params.get('reason') === 'expired') {
    showInfo('Your session expired. Please sign in again.');
  }
  const next = params.get('next');

  // Dev mode: Worker URL not configured → skip login, go straight to dashboard
  if (window.AxessAuth && !window.AxessAuth.WORKER_URL) {
    showInfo('Dev preview · auth Worker not configured. Skipping login.');
    setTimeout(() => window.location.replace(next && next.startsWith(window.location.origin) ? next : 'dashboard.html'), 600);
    return;
  }

  // If already authenticated locally, redirect to dashboard
  if (window.AxessAuth && window.AxessAuth.isAuthenticated()) {
    window.location.replace(next && next.startsWith(window.location.origin) ? next : 'dashboard.html');
    return;
  }

  form.addEventListener('submit', async function (ev) {
    ev.preventDefault();
    clearError();
    const u = userIn.value.trim();
    const p = passIn.value;
    if (!u || !p) { showError('Username and password are required.'); return; }
    submitBtn.disabled = true;
    submitBtn.classList.add('loading');
    submitBtn.querySelector('.btn-label').textContent = 'Signing in…';
    try {
      const res = await window.AxessAuth.login(u, p, remember.checked);
      if (!res.ok) {
        showError(res.error || 'Sign in failed. Please try again.');
        return;
      }
      // Success — redirect
      const target = (next && next.startsWith(window.location.origin)) ? next : 'dashboard.html';
      window.location.replace(target);
    } catch (e) {
      showError('Unexpected error: ' + (e.message || e));
    } finally {
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
      submitBtn.querySelector('.btn-label').textContent = 'Sign in';
    }
  });

  userIn.focus();
})();
</script>
</body>
</html>
